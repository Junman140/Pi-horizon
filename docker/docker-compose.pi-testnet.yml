version: '3'
services:
  # ------------------------------------------------------------------
  # Horizon's own PostgreSQL (stores ingested ledger data)
  # ------------------------------------------------------------------
  horizon-postgres:
    platform: linux/amd64
    image: postgres:12-bullseye
    restart: on-failure
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_DB=horizon
    expose:
      - "5432"
    volumes:
      - "horizon-db-data:/var/lib/postgresql/data"

  # ------------------------------------------------------------------
  # Horizon API server - ingest mode, tx submission disabled
  # ------------------------------------------------------------------
  horizon:
    platform: linux/amd64
    depends_on:
      - horizon-postgres
    build:
      context: ../
      dockerfile: docker/Dockerfile.dev
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      # === Pi Network identity ===
      - NETWORK=pitestnet
      # Or set passphrase + history archives manually instead of NETWORK:
      # - NETWORK_PASSPHRASE=Pi Testnet
      # - HISTORY_ARCHIVE_URLS=https://history.testnet.minepi.com/  # <-- update this

      # === Database ===
      - DATABASE_URL=postgres://postgres@horizon-postgres:5432/horizon?sslmode=disable

      # === Pi Node (stellar-core) connection ===
      # Point to your Pi Node's stellar-core HTTP port
      - STELLAR_CORE_URL=http://pi-node:11626

      # === Ingest (read-only, no tx submission) ===
      - INGEST=true
      - DISABLE_TX_SUB=true

      # === Rate limit disabled for local use ===
      - PER_HOUR_RATE_LIMIT=0

    command: ["--apply-migrations"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  horizon-db-data:
