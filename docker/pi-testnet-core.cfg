# Pi Testnet — stellar-core (watcher-style template)
#
# Authoritative quorum / peer list: copy [[VALIDATORS]] (and any KNOWN_PEERS)
# from your running Pi Testnet node:
#   docker exec <container> cat /opt/stellar/core/etc/stellar-core.cfg
# (paths may differ; Pi Node Docker often uses /opt/stellar/core/etc/)
#
# Verified from Pi history CDN (stellar-history.json):
#   NETWORK_PASSPHRASE = Pi Testnet
#   https://history.testnet.minepi.com/.well-known/stellar-history.json
#
# This repo's Horizon defaults (see internal/flags.go) match that passphrase and
# use history URL: https://history.testnet.minepi.com/
#
# ---------------------------------------------------------------------------
# Pi MAINNET passphrase (official Pi Node Docker / pi-node-docker): "Pi Network"
# NOT "Pi Mainnet". This fork's Horizon uses NETWORK=pimainnet with passphrase
# "Pi Mainnet" in code — if you target real Pi mainnet, align passphrase with
# your stellar-core.cfg / Pi Core Team configs.
# ---------------------------------------------------------------------------

PUBLIC_HTTP_PORT = true
HTTP_PORT = 11626
PEER_PORT = 31402

COMMANDS = ["ll?level=info"]
LOG_FILE_PATH = "/tmp/stellar-core.log"
BUCKET_DIR_PATH = "/opt/stellar/core/buckets"

NETWORK_PASSPHRASE = "Pi Testnet"
KNOWN_CURSORS = ["HORIZON"]

# Matches docker-compose.pi-full.yml (core-postgres + trust auth)
DATABASE = "postgresql://dbname=core host=core-postgres user=stellar password=stellar port=5432"
CATCHUP_COMPLETE = false
CATCHUP_RECENT = 256

NODE_IS_VALIDATOR = false

UNSAFE_QUORUM = true
FAILURE_SAFETY = 0
QUORUM_INTERSECTION_CHECKER = false

[[HOME_DOMAINS]]
HOME_DOMAIN = "pi-core-team"
QUALITY = "MEDIUM"

# ---------------------------------------------------------------------------
# REPLACE THIS BLOCK with validators from your Pi Testnet node config.
# The entry below is the minimal quorum key used by this repo's Horizon when
# no captive-core file is supplied (internal/flags.go). It is NOT guaranteed
# to be sufficient for a public-facing validator set — get the real list from
# Pi Core / your Pi Node export.
# ---------------------------------------------------------------------------
[[VALIDATORS]]
NAME = "horizon-fork-default-quorum"
HOME_DOMAIN = "pi-core-team"
PUBLIC_KEY = "GCZBOIAY4HLKAJVNJORXZOZRAY2BJDBZHKPBHZCRAIUR5IHC2UHBGCQR"
HISTORY = "curl -sf https://history.testnet.minepi.com/{0} -o {1}"

[HISTORY.local]
get = "cp /opt/stellar/history/local/{0} {1}"
put = "cp {0} /opt/stellar/history/local/{1}"
mkdir = "mkdir -p /opt/stellar/history/local/{0}"
