services:
  core-postgres:
    platform: linux/amd64
    image: postgres:16-bookworm
    restart: on-failure
    environment:
      POSTGRES_USER: stellar
      POSTGRES_PASSWORD: stellar
      POSTGRES_DB: core
    expose:
      - "5432"
    volumes:
      - core-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellar -d core"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 30s

  pi-core:
    image: pinetwork/pi-node-docker:community-v1.1-p23.0.1
    platform: linux/amd64
    depends_on:
      core-postgres:
        condition: service_healthy
    restart: on-failure
    ports:
      - "11626:11626"
    volumes:
      - ./pi-testnet-core.cfg:/stellar-core.cfg:ro
    environment:
      - NODE_SEED=SDHFHDWSCKHV3KNPQFQDNE4Y5HMDUT26A5AICWQCDG6JBMUBQYCHUXAE
    entrypoint: ["stellar-core"]
    command: ["run", "--conf", "/stellar-core.cfg"]

  horizon-postgres:
    platform: linux/amd64
    image: postgres:16-bookworm
    restart: on-failure
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: horizon
    expose:
      - "5432"
    volumes:
      - horizon-db-data:/var/lib/postgresql/data

  horizon:
    platform: linux/amd64
    depends_on:
      - horizon-postgres
      - pi-core
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      args:
        STELLAR_CORE_VERSION: "23*"
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - NETWORK=pitestnet
      - DATABASE_URL=postgres://postgres@horizon-postgres:5432/horizon?sslmode=disable
      - STELLAR_CORE_URL=http://pi-core:11626
      - STELLAR_CORE_VERSION=23*
      - INGEST=true
      - DISABLE_TX_SUB=true
      - PER_HOUR_RATE_LIMIT=0
    command: ["--apply-migrations"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  core-db-data:
  horizon-db-data:
