# Minimal Horizon-only compose — no standalone stellar-core needed.
# Captive core runs inside the Horizon container.
services:
  horizon-postgres:
    platform: linux/amd64
    image: postgres:16-bookworm
    restart: on-failure
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: horizon
    expose:
      - "5432"
    volumes:
      - horizon-db-data:/var/lib/postgresql/data

  horizon:
    platform: linux/amd64
    depends_on:
      - horizon-postgres
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      args:
        STELLAR_CORE_VERSION: "23*"
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ./captive-core-mainnet.cfg:/captive-core-mainnet.cfg:ro
    environment:
      - NETWORK=pimainnet
      - DATABASE_URL=postgres://postgres@horizon-postgres:5432/horizon?sslmode=disable
      - STELLAR_CORE_URL=http://localhost:11626
      - CAPTIVE_CORE_CONFIG_PATH=/captive-core-mainnet.cfg
      - STELLAR_CORE_VERSION=23*
      - INGEST=true
      - DISABLE_TX_SUB=true
      - PER_HOUR_RATE_LIMIT=0
    command: ["--apply-migrations"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  horizon-db-data:
