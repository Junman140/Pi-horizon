services:
  pi-core:
    image: pinetwork/pi-node-docker:community-v1.1-p23.0.1
    platform: linux/amd64
    restart: on-failure
    ports:
      - "11626:11626"
    environment:
      - PUBLIC_HTTP_PORT=true
    command: ["--testnet2"]

  horizon-postgres:
    platform: linux/amd64
    image: postgres:12-bullseye
    restart: on-failure
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: horizon
    expose:
      - "5432"
    volumes:
      - horizon-db-data:/var/lib/postgresql/data

  horizon:
    platform: linux/amd64
    depends_on:
      - horizon-postgres
      - pi-core
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      args:
        STELLAR_CORE_VERSION: "23*"
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - NETWORK=pitestnet
      - DATABASE_URL=postgres://postgres@horizon-postgres:5432/horizon?sslmode=disable
      - STELLAR_CORE_URL=http://pi-core:11626
      - STELLAR_CORE_VERSION=23*
      - INGEST=true
      - DISABLE_TX_SUB=true
      - PER_HOUR_RATE_LIMIT=0
    command: ["--apply-migrations"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  horizon-db-data:
